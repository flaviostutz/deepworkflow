workspace_dir: "."
task_instructions: "List all Python files and summarize their purpose."

# model must be a dict of init_chat_model() kwargs
# Values can reference environment variables using ${VAR_NAME} syntax

# Azure OpenAI model configuration
# Non-secret config: set DEEPWORKFLOW_MODEL, DEEPWORKFLOW_MODEL_PROVIDER,
#   DEEPWORKFLOW_AZURE_OPENAI_ENDPOINT, DEEPWORKFLOW_API_VERSION in .env
# Secret: DEEPWORKFLOW_API_KEY in macOS Keychain (run 'make setup-secrets')
model:
  model_provider: ${DEEPWORKFLOW_MODEL_PROVIDER}
  model: ${DEEPWORKFLOW_MODEL}
  azure_endpoint: ${DEEPWORKFLOW_AZURE_OPENAI_ENDPOINT}
  api_version: ${DEEPWORKFLOW_API_VERSION}
  api_key: ${DEEPWORKFLOW_API_KEY}

workspace_write_option: "read-only"
evaluate_quality_max_retries: 1
evaluate_quality_on_max_retries: "continue"
evaluate_quality_min: "WARNING"
evaluate_quality_skip: false
log_level: info

# Omit task_files to let the map agent discover relevant files automatically
# task_files:
#   - "src/**/*.py"
